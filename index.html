<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>图片制作工具 - 透明通道版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#D4AF37;--gold-light:#F4E5BC;--gold-dark:#B8962E;--dark:#1a1a1a;--darker:#0d0d0d;--gray:#333;--light:#f5f5f5;}
body{font-family:'Noto Sans SC',sans-serif;background:linear-gradient(145deg,var(--darker) 0%,var(--dark) 50%,#1f1f1f 100%);min-height:100vh;color:var(--light);padding:10px;overflow-x:hidden;}
.toolbar{max-width:1400px;margin:0 auto 15px;background:linear-gradient(180deg,#2a2a2a 0%,#1a1a1a 100%);border:1px solid var(--gold-dark);border-radius:12px;padding:12px 15px;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.toolbar-row{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
.toolbar-row:last-child{margin-bottom:0;}
.toolbar-group{display:flex;gap:6px;flex:1;align-items:center;padding:0 8px;border-right:1px solid #444;}
.toolbar-group:last-child{border-right:none;}
.btn{flex:1;background:linear-gradient(180deg,#3a3a3a 0%,#2a2a2a 100%);border:1px solid #555;color:var(--light);padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px;user-select:none;white-space:nowrap;}
.btn:hover{background:linear-gradient(180deg,#4a4a4a 0%,#3a3a3a 100%);border-color:var(--gold);color:var(--gold);}
.btn.primary{background:linear-gradient(180deg,var(--gold-dark) 0%,#9A7B1C 100%);border-color:var(--gold);color:var(--darker);font-weight:500;}
.btn.primary:hover{background:linear-gradient(180deg,var(--gold) 0%,var(--gold-dark) 100%);}
.btn.active{background:var(--gold);color:var(--darker);border-color:var(--gold);}
.btn-sm{padding:6px 8px;font-size:11px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-gold{background:linear-gradient(180deg,#FFD700,#D4AF37);border:1px solid #FFD700;color:#1a1a1a;font-weight:600;}
.btn-vip{background:linear-gradient(180deg,#FFD700,#FFA500);border:2px solid #FFD700;color:#1a0f00;font-weight:700;}
.btn-fire{background:linear-gradient(180deg,#FF6B35,#D4380D);border:1px solid #FF6B35;color:#fff;}
.btn-neon-blue{background:linear-gradient(180deg,#00D4FF,#0099CC);border:1px solid #00D4FF;color:#001a22;}
.btn-glass{background:linear-gradient(180deg,#F5F5F5,#E0E0E0);border:1px solid #F5F5F5;color:#1a1a1a;}
.btn-paste{background:linear-gradient(180deg,#4CAF50,#2E7D32);border:1px solid #4CAF50;color:#fff;}
.toolbar-label{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-right:5px;min-width:40px;}
input[type="file"]{display:none;}
input[type="color"]{width:30px;height:28px;border:1px solid #555;border-radius:4px;background:#2a2a2a;cursor:pointer;padding:0;}
input[type="range"]{width:80px;accent-color:var(--gold);cursor:pointer;}
input[type="number"]{width:45px;padding:4px 6px;background:#222;border:1px solid #444;border-radius:4px;color:var(--gold-light);font-size:12px;text-align:center;font-family:monospace;}
input:focus{outline:none;border-color:var(--gold);}
input:disabled{opacity:0.5;cursor:not-allowed;}
.workspace{display:flex;justify-content:center;align-items:flex-start;gap:20px;max-width:1400px;margin:0 auto;}
.layout-bottom{flex-direction:column;align-items:center;}
.layout-bottom .canvas-container{margin-bottom:20px;}
.canvas-container{background:#111;border-radius:16px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,0.6);position:relative;width:100%;max-width:600px;display:flex;justify-content:center;}
#mainCanvas{display:block;background:#222;border-radius:4px;cursor:move;touch-action:none;max-width:100%;height:auto;}
.canvas-container.snap-active{box-shadow:0 0 0 2px #ff4444,0 20px 60px rgba(0,0,0,0.6);}
.snap-line{position:absolute;pointer-events:none;z-index:10;}
.snap-line-vertical{width:1px;height:100%;background:#ff4444;top:0;}
.snap-line-horizontal{height:1px;width:100%;left:0;}
.controls-panel{width:280px;background:linear-gradient(180deg,#2a2a2a 0%,#1a1a1a 100%);border:1px solid #333;border-radius:12px;padding:15px;max-height:90vh;overflow-y:auto;}
.control-section{margin-bottom:15px;padding-bottom:12px;border-bottom:1px solid #333;}
.control-section:last-child{border-bottom:none;}
.control-section h3{font-size:12px;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
.control-section h3.collapsible{display:flex;justify-content:space-between;cursor:pointer;user-select:none;}
.control-section h3.collapsible:hover{color:var(--gold-light);}
.control-section h3.collapsible .toggle-icon{font-size:10px;transition:transform 0.2s;}
.control-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.control-row label{font-size:11px;color:#999;min-width:40px;}
.control-row .unit{font-size:10px;color:#666;margin-left:2px;}
.object-list{max-height:180px;overflow-y:auto;margin-top:5px;}
.object-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#252525;border-radius:6px;margin-bottom:5px;font-size:11px;cursor:pointer;border:1px solid #3a3a3a;transition:all 0.2s;}
.object-item:hover{border-color:#555;background:#2a2a2a;}
.object-item.selected{border-color:var(--gold);background:#2a2a20;}
.object-item.locked-item{border-color:#D4AF37;}
.object-item.hidden-item{opacity:0.4;}
.object-item.preset-item{border-color:#4CAF50;background:#1a2a1a;}
.object-info{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
.eye-btn,.lock-btn{background:#333;border:none;color:#888;cursor:pointer;font-size:11px;padding:3px 6px;border-radius:4px;flex-shrink:0;}
.eye-btn:hover,.lock-btn:hover{background:#444;color:#fff;}
.eye-btn.hidden-eye{background:#442222;color:#ff6666;}
.lock-btn.locked{background:linear-gradient(135deg,#D4AF37 0%,#8B7500 100%);color:#1a1a1a;border:1px solid #FFD700;}
.layer-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:2px;cursor:text;}
.layer-nameInput{width:100%;background:#222;border:1px solid #555;color:#fff;padding:2px 4px;font-size:11px;border-radius:3px;}
.delete-btn{background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:2px 6px;}
.delete-btn:hover{background:#442222;color:#ff6b6b;}
.style-preset-row{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap;}
.style-preset-row .btn{flex:1;min-width:40px;font-size:9px;padding:4px 2px;}
.align-row{display:flex;gap:4px;margin-bottom:8px;}
.align-row .btn{flex:1;min-width:50px;font-size:10px;padding:5px 2px;}
.preset-header{display:flex;align-items:center;gap:6px;padding:8px 10px;background:linear-gradient(135deg,#1a3a1a 0%,#0d1f0d 100%);border:1px solid #4CAF50;border-radius:6px;margin-bottom:8px;}
.preset-header-icon{font-size:14px;}
.preset-header-text{font-size:11px;color:#4CAF50;font-weight:500;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gold);color:var(--darker);padding:10px 20px;border-radius:8px;font-weight:500;opacity:0;transition:all 0.3s;z-index:1000;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.error{background:#ef4444;color:#fff;}
.toast.success{background:#22c55e;color:#fff;}
.upload-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;z-index:1000;backdrop-filter:blur(5px);pointer-events:auto;}
.upload-panel.show{display:flex;}
.upload-panel-inner{background:#1a1a1a;border:2px dashed #444;border-radius:16px;padding:40px;width:90%;max-width:400px;text-align:center;transition:border-color 0.2s,transform 0.2s,background 0.2s;}
.upload-panel-inner.drag-over{border-color:#D4AF37;background:#1a1a10;transform:scale(1.03);}
.upload-panel-inner h3{color:var(--gold);margin-bottom:15px;}
.upload-panel-inner p{color:#888;font-size:12px;margin-bottom:15px;}
.upload-actions{display:flex;justify-content:center;gap:12px;margin-top:10px;}
.upload-actions .btn{min-width:120px;}
.locked-hint{background:#3a3520;border:1px solid #D4AF37;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#D4AF37;text-align:center;}
.batch-panel{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 100%);border:1px solid #4f46e5;border-radius:8px;padding:12px;margin-bottom:10px;}
.batch-panel h4{color:#818cf8;font-size:11px;margin-bottom:10px;text-transform:uppercase;}
.batch-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.batch-row label{font-size:11px;color:#a5b4fc;min-width:50px;}
.batch-row input[type="date"],.batch-row input[type="number"]{width:100px;}
.batch-preview{font-size:10px;color:#6366f1;margin-top:8px;padding:6px;background:rgba(99,102,241,0.1);border-radius:4px;}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:2000;flex-direction:column;gap:20px;}
.loading-overlay.show{display:flex;}
.loading-spinner{width:50px;height:50px;border:4px solid #333;border-top:4px solid #6366f1;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.loading-text{color:#fff;font-size:14px;}
@media (max-width:900px){.toolbar{padding:10px;}.toolbar-row{flex-wrap:wrap;}.toolbar-group{flex:1 1 auto;min-width:45%;padding:5px;border-right:none;border-bottom:1px solid #444;margin-bottom:5px;}.toolbar-group:last-child{border-bottom:none;}.btn{font-size:11px;padding:6px 8px;}.workspace{flex-direction:column;align-items:center;}.controls-panel{width:100%;max-width:600px;margin-top:20px;}}
</style>
</head>
<body>
<div class="toolbar">
<div class="toolbar-row">
<div class="toolbar-group"><span class="toolbar-label">素材</span>
<button class="btn" onclick="showUploadPanel()">➕ 图片</button>
<button class="btn" onclick="addAdSlots()">📦 广告位</button>
</div>
<div class="toolbar-group"><span class="toolbar-label">文字</span>
<button class="btn primary" onclick="addTitle()">➕ 标题</button>
</div>
</div>
<div class="toolbar-row">
<div class="toolbar-group"><span class="toolbar-label">项目</span>
<button class="btn" onclick="document.getElementById('projectUpload').click()">📂 导入</button>
<input type="file" id="projectUpload" accept=".json" onchange="importProject(event)" style="display:none;">
<button class="btn" onclick="exportProject()">💾 导出</button>
</div>
<div class="toolbar-group"><span class="toolbar-label">导出</span>
<button class="btn primary" onclick="exportCanvas(false)">PNG</button>
<button class="btn" onclick="exportCanvas(true)">透明</button>
</div>
</div>
<div class="toolbar-row">
<div class="toolbar-group"><span class="toolbar-label">历史</span>
<button class="btn" id="undoBtn" onclick="undo()" title="Undo">↩️ Undo</button>
<button class="btn" id="redoBtn" onclick="redo()" title="Redo">↪️ Redo</button>
</div>
<div class="toolbar-group"><span class="toolbar-label">视图</span>
<button class="btn" onclick="toggleLayout()">🔄 排版</button>
<button class="btn" id="templateSwitchBtn" onclick="switchTemplate()">📋 模板</button>
</div>
</div>
</div>
<div class="workspace" id="workspace">
<div class="canvas-container" id="canvasContainer">
<div id="snapLineV" class="snap-line snap-line-vertical" style="left:50%;display:none;"></div>
<div id="snapLineH" class="snap-line snap-line-horizontal" style="top:50%;display:none;"></div>
<canvas id="mainCanvas" width="600" height="800"></canvas>
</div>
<div class="controls-panel" id="sidePanel">
<div class="control-section"><h3>选中元素</h3><div id="selectedInfo" style="font-size:11px;color:#999;padding:5px 0;word-break:break-all;">未选中任何元素</div></div>
<div id="lockedHint" class="locked-hint" style="display:none;">🔒 已锁定（不可移动 / 缩放 / 旋转）</div>
<div class="control-section" id="transformControls" style="display:none;">
<h3>变换</h3>
<div class="control-row" id="textContentRow" style="display:none;margin-bottom:10px;"><input type="text" id="textContentInput" placeholder="输入文字..." style="width:100%;padding:5px;background:#222;border:1px solid #444;color:#fff;border-radius:4px;" oninput="updateTextContent()"></div>
<div class="control-row"><label>X</label><input type="range" id="posX" min="0" max="600" value="300" oninput="updateTransform('posX')"><input type="number" id="posXInput" value="300" oninput="inputSyncSlider('posX')" onchange="updateTransformFromInput('posX')"></div>
<div class="control-row"><label>Y</label><input type="range" id="posY" min="0" max="800" value="400" oninput="updateTransform('posY')"><input type="number" id="posYInput" value="400" oninput="inputSyncSlider('posY')" onchange="updateTransformFromInput('posY')"></div>
<div class="control-row"><label>缩放</label><input type="range" id="scale" min="1" max="1000" value="100" oninput="updateTransform('scale')"><input type="number" id="scaleInput" value="100" min="1" max="1000" oninput="inputSyncSlider('scale')" onchange="updateTransformFromInput('scale')"><span class="unit">%</span></div>
<div class="control-row"><label>旋转</label><input type="range" id="rotation" min="0" max="360" value="0" oninput="updateTransform('rotation')"><input type="number" id="rotationInput" value="0" min="0" max="360" oninput="inputSyncSlider('rotation')" onchange="updateTransformFromInput('rotation')"><span class="unit">°</span></div>
<div style="display:flex;gap:5px;margin-top:8px;"><button class="btn btn-sm" onclick="deleteSelected()" style="flex:1;color:#ff6b6b;">🗑️ 删除</button></div>
</div>
<div class="control-section" id="textControls" style="display:none;">
<h3 class="collapsible" onclick="toggleTextPanel()">文字样式 <span class="toggle-icon" id="textPanelToggle">▼</span></h3>
<div id="textPanelContent">
<div style="font-size:10px;color:#aaa;margin-bottom:4px;margin-top:8px;">对齐方式</div>
<div class="align-row">
<button class="btn btn-sm" id="align_left" onclick="setTextAlign('left')">⬅️ 靠左</button>
<button class="btn btn-sm" id="align_center" onclick="setTextAlign('center')">⬆️ 置中</button>
<button class="btn btn-sm" id="align_right" onclick="setTextAlign('right')">➡️ 靠右</button>
</div>
<div class="style-preset-row" style="margin-top:8px;">
<button class="btn btn-sm btn-gold" id="preset_gold_basic" onclick="setStylePreset('gold_basic')">金</button>
<button class="btn btn-sm btn-vip" id="preset_vip_gold" onclick="setStylePreset('vip_gold')">VIP</button>
<button class="btn btn-sm btn-fire" id="preset_red_fire" onclick="setStylePreset('red_fire')">火</button>
<button class="btn btn-sm btn-neon-blue" id="preset_blue_neon" onclick="setStylePreset('blue_neon')">蓝</button>
</div>
<div class="style-preset-row">
<button class="btn btn-sm" style="background:#660099;color:white;border-color:#660099" id="preset_purple_glow" onclick="setStylePreset('purple_glow')">紫</button>
<button class="btn btn-sm btn-glass" id="preset_white_glass" onclick="setStylePreset('white_glass')">白</button>
</div>
<div class="control-row" style="margin-top:8px;"><label>字号</label><input type="range" id="fontSize" min="12" max="200" value="48" oninput="updateText('fontSize')"><input type="number" id="fontSizeInput" value="48" min="12" max="200" oninput="inputSyncSlider('fontSize')" onchange="updateTextFromInput('fontSize')"><span class="unit">px</span></div>
<div style="border-top:1px solid #444;margin:8px 0;padding-top:5px;">
<div style="font-size:10px;color:#aaa;margin-bottom:4px;">渐变填充</div>
<div class="control-row"><label>颜色1</label><input type="color" id="gradientColor1" value="#D4AF37" onchange="updateGradientColor(1)"></div>
<div class="control-row"><label>颜色2</label><input type="color" id="gradientColor2" value="#F4E5BC" onchange="updateGradientColor(2)"></div>
<div class="control-row"><label>颜色3</label><input type="color" id="gradientColor3" value="#000000" onchange="updateGradientColor(3)"></div>
<div class="control-row"><label>角度</label><input type="range" id="gradientAngle" min="0" max="360" value="0" oninput="updateEffect('gradientAngle');syncNumber('gradientAngle')"><input type="number" id="gradientAngleInput" value="0" min="0" max="360" oninput="inputSyncSlider('gradientAngle');updateEffectFromInput('gradientAngle')"><span class="unit">°</span></div>
<div class="control-row"><label>大小</label><input type="range" id="gradientSize" min="10" max="500" value="100" oninput="updateEffect('gradientSize');syncNumber('gradientSize')"><input type="number" id="gradientSizeInput" value="100" min="10" max="500" oninput="inputSyncSlider('gradientSize');updateEffectFromInput('gradientSize')"><span class="unit">%</span></div>
<div class="control-row"><label>X偏移</label><input type="range" id="gradientX" min="-200" max="200" value="0" oninput="updateEffect('gradientX');syncNumber('gradientX')"><input type="number" id="gradientXInput" value="0" min="-200" max="200" oninput="inputSyncSlider('gradientX');updateEffectFromInput('gradientX')"><span class="unit">px</span></div>
<div class="control-row"><label>Y偏移</label><input type="range" id="gradientY" min="-200" max="200" value="0" oninput="updateEffect('gradientY');syncNumber('gradientY')"><input type="number" id="gradientYInput" value="0" min="-200" max="200" oninput="inputSyncSlider('gradientY');updateEffectFromInput('gradientY')"><span class="unit">px</span></div>
</div>
<div style="border-top:1px solid #444;margin:8px 0;padding-top:5px;">
<div style="font-size:10px;color:#aaa;margin-bottom:4px;">阴影 (外)</div>
<div class="control-row"><label>OffsetX</label><input type="range" id="shadowOffsetX" min="-50" max="50" value="0" oninput="updateEffect('shadowOffsetX');syncNumber('shadowOffsetX')"><input type="number" id="shadowOffsetXInput" value="0" oninput="inputSyncSlider('shadowOffsetX');updateEffectFromInput('shadowOffsetX')"></div>
<div class="control-row"><label>OffsetY</label><input type="range" id="shadowOffsetY" min="-50" max="50" value="0" oninput="updateEffect('shadowOffsetY');syncNumber('shadowOffsetY')"><input type="number" id="shadowOffsetYInput" value="0" oninput="inputSyncSlider('shadowOffsetY');updateEffectFromInput('shadowOffsetY')"></div>
<div class="control-row"><label>扩展</label><input type="range" id="shadowSize" min="0" max="50" value="0" oninput="updateEffect('shadowSize');syncNumber('shadowSize')"><input type="number" id="shadowSizeInput" value="0" oninput="inputSyncSlider('shadowSize');updateEffectFromInput('shadowSize')"><span class="unit">px</span></div>
<div class="control-row"><label>模糊度</label><input type="range" id="shadowSpread" min="0" max="50" value="0" oninput="updateEffect('shadowSpread');syncNumber('shadowSpread')"><input type="number" id="shadowSpreadInput" value="0" oninput="inputSyncSlider('shadowSpread');updateEffectFromInput('shadowSpread')"><span class="unit">px</span></div>
<div class="control-row"><label>颜色</label><input type="color" id="shadowColor" value="#000000" onchange="updateEffectColor('shadowColor')"></div>
</div>
<div style="border-top:1px solid #444;margin:8px 0;padding-top:5px;">
<div style="font-size:10px;color:#aaa;margin-bottom:4px;">发光 (Glow)</div>
<div class="control-row"><label>模糊</label><input type="range" id="glowBlur" min="0" max="50" value="0" oninput="updateEffect('glowBlur');syncNumber('glowBlur')"><input type="number" id="glowBlurInput" value="0" min="0" max="50" oninput="inputSyncSlider('glowBlur');updateEffectFromInput('glowBlur')"><span class="unit">px</span></div>
<div class="control-row"><label>颜色</label><input type="color" id="glowColor" value="#FFD700" onchange="updateEffectColor('glowColor')"></div>
</div>
<div style="border-top:1px solid #444;margin:8px 0;padding-top:5px;">
<div style="font-size:10px;color:#aaa;margin-bottom:4px;">描边 (外)</div>
<div class="control-row" style="gap:5px;"><label style="min-width:20px;">1</label><input type="color" id="strokeColor1" value="#000000" onchange="updateEffectColor('strokeColor1')" style="width:25px;"><input type="number" id="strokeWidth1" value="0" min="0" max="20" style="width:45px" oninput="updateEffect('strokeWidth1')"></div>
<div class="control-row" style="gap:5px;"><label style="min-width:20px;">2</label><input type="color" id="strokeColor2" value="#000000" onchange="updateEffectColor('strokeColor2')" style="width:25px;"><input type="number" id="strokeWidth2" value="0" min="0" max="20" style="width:45px" oninput="updateEffect('strokeWidth2')"></div>
</div>
</div>
</div>
<div class="control-section">
<h3>图层列表</h3>
<div class="preset-header"><span class="preset-header-icon">⭐</span><span class="preset-header-text">预设图层（最前）</span></div>
<div id="presetLayerList"></div>
<div style="display:flex; gap:6px; margin-bottom:8px; margin-top:12px;">
<button class="btn btn-sm" style="flex:1" onclick="copyLayer()">📋 复制</button>
<button class="btn btn-sm" style="flex:1" onclick="pasteLayer()">📄 粘贴</button>
</div>
<div style="display:flex; gap:6px; margin-bottom:8px;">
<button class="btn btn-sm" style="flex:1" onclick="moveLayer(1)">⬆️ 上移</button>
<button class="btn btn-sm" style="flex:1" onclick="moveLayer(-1)">⬇️ 下移</button>
</div>
<div style="display:flex; gap:6px; margin-bottom:8px;">
<button class="btn btn-sm" style="flex:1" onclick="copyStyle()">🎨 复制样式</button>
<button class="btn btn-sm" style="flex:1" onclick="pasteStyle()">🧩 粘贴样式</button>
</div>
<h3 style="margin-top:15px;">模板图层</h3>
<div class="object-list" id="objectList"></div>
</div>

// 获取当前系统日期时间 - 12小时制
function getCurrentDateTime12(){
const now=new Date();
const year=now.getFullYear();
const month=String(now.getMonth()+1).padStart(2,'0');
const day=String(now.getDate()).padStart(2,'0');
const hours=now.getHours();
const minutes=now.getMinutes();
const h12=hours%12||12;
const ampm=hours<12?'AM':'PM';
return`${year}-${month}-${day} ${String(h12).padStart(2,'0')}:${minutes} ${ampm}`;
}
// 获取当前系统日期 - DD/MM/YYYY格式
function getCurrentDateDMY(){
const now=new Date();
const day=String(now.getDate()).padStart(2,'0');
const month=String(now.getMonth()+1).padStart(2,'0');
const year=now.getFullYear();
return`${day}/${month}/${year}`;
}
// 获取当前系统时间 - 24小时制 HH:MM:SS
function getCurrentTime24(){
const now=new Date();
const hours=String(now.getHours()).padStart(2,'0');
const minutes=String(now.getMinutes()).padStart(2,'0');
const seconds=String(now.getSeconds()).padStart(2,'0');
return`${hours}:${minutes}:${seconds}`;
}

function editLayerName(e,index,type){e.stopPropagation();const span=e.target;const arr=type==='preset'?presetElements:templateElements;const el=arr[index];if(span.tagName==='INPUT')return;const input=document.createElement('input');input.type='text';input.value=el.name||el.text;input.className='layer-nameInput';span.replaceWith(input);input.focus();input.select();input.onblur=save;input.onkeydown=(ev)=>{if(ev.key==='Enter')save();if(ev.key==='Escape')updateObjectList();};function save(){const val=input.value.trim();if(val){el.name=val;}updateObjectList();saveState();}}

function render(isTransparent=false){
// 清除画布
ctx.clearRect(0,0,canvasConfig.width,canvasConfig.height);
if(!isTransparent){
ctx.fillStyle='#1a1a1a';
ctx.fillRect(0,0,canvasConfig.width,canvasConfig.height);
}

// 渲染模板图层
templateElements.forEach((el,idx)=>{
if(el.visible===false)return;
ctx.save();
ctx.globalAlpha=el.opacity;
if(el.type==='text'){
renderText(ctx,el);
}else if(el.type==='image'){
ctx.translate(el.x,el.y);
ctx.rotate(el.rotation*Math.PI/180);
const w=el.width*(el.scale||1);
const h=el.height*(el.scale||1);
ctx.drawImage(el.img,-w/2,-h/2,w,h);
}else if(el.type==='imageSlot'){
ctx.translate(el.x,el.y);
ctx.rotate(el.rotation*Math.PI/180);
const w=el.width*(el.scale||1);
const h=el.height*(el.scale||1);
if(el.img){
    ctx.drawImage(el.img,-w/2,-h/2,w,h);
}else{
ctx.fillStyle='#ffffff';
ctx.fillRect(-w/2,-h/2,w,h);
ctx.strokeStyle='#cccccc';
ctx.setLineDash([6,4]);
ctx.strokeRect(-w/2,-h/2,w,h);
ctx.setLineDash([]);
ctx.fillStyle='#999';
ctx.font='12px Arial';
ctx.textAlign='center';
ctx.fillText('点击替换',0,0);
}
}
ctx.restore();
});

// 渲染预设图层
presetElements.forEach((el,idx)=>{
if(el.visible===false)return;
ctx.save();
ctx.globalAlpha=el.opacity;
if(el.type==='text'){
renderText(ctx,el);
}else if(el.type==='image'){
ctx.translate(el.x,el.y);
ctx.rotate(el.rotation*Math.PI/180);
const w=el.width*(el.scale||1);
const h=el.height*(el.scale||1);

}
function renderText(ctx,el){
ctx.save();
ctx.translate(el.x,el.y);
ctx.rotate(el.rotation*Math.PI/180);
ctx.textAlign=el.align;
ctx.textBaseline='middle';
ctx.lineJoin="round";
ctx.lineCap="round";
const fontSize=el.fontSize*el.scale;
ctx.font=`bold ${fontSize}px 'Noto Sans SC', 'Microsoft YaHei', Arial Narrow`;
const w=getTextWidth(el);
const isHuazi=el.stylePreset==='huazi';
if(isHuazi){
const shadowOffsetX=el.shadowOffsetX||0,shadowOffsetY=el.shadowOffsetY||4,shadowSize=el.shadowSize||12,shadowSpread=el.shadowSpread||12,shadowColor=el.shadowColor||'rgba(0,0,0,0.85)';
if(shadowSize>0||shadowOffsetX!==0||shadowOffsetY!==0){
ctx.save();
const shadowLayers=Math.min(12,Math.max(6,Math.floor(shadowSize/2)));
for(let i=shadowLayers;i>=0;i--){
const layerOffset=i*0.6,alpha=0.3-(i/shadowLayers)*0.25;
ctx.save();
ctx.font=`bold ${fontSize}px 'Noto Sans SC', 'Microsoft YaHei', Arial Narrow`;
ctx.textAlign=el.align;
ctx.textBaseline='middle';
ctx.globalAlpha=Math.max(0.05,alpha);
ctx.fillStyle=shadowColor;
ctx.shadowBlur=0;
ctx.shadowColor='transparent';
ctx.fillText(el.text,shadowOffsetX+layerOffset,shadowOffsetY+layerOffset);
ctx.restore();
}
if(shadowSpread>0){
ctx.shadowColor=shadowColor;
ctx.shadowBlur=shadowSpread;
ctx.globalAlpha=0.85;
ctx.fillText(el.text,shadowOffsetX,shadowOffsetY);
ctx.shadowBlur=0;
}
ctx.restore();
}
if(el.strokeWidth2>0){
ctx.lineWidth=el.strokeWidth2;
ctx.strokeStyle=el.strokeColor2||shadowColor;
ctx.strokeText(el.text,0,0);
}
if(el.strokeWidth1>0){
ctx.lineWidth=el.strokeWidth1;
ctx.strokeStyle=el.strokeColor1||el.gradientColor1||'#FFD700';
ctx.strokeText(el.text,0,0);
}
ctx.lineWidth=2;
ctx.strokeStyle='rgba(255,255,255,0.6)';
ctx.strokeText(el.text,0,0);
ctx.globalAlpha=1;
const preset=textPresetConfig[el.stylePreset]||textPresetConfig.normal;
const gradColor1=el.gradientColor1||(preset.gradientStops?preset.gradientStops[0].color:'#ffffff');
const gradColor2=el.gradientColor2||(preset.gradientStops?preset.gradientStops[preset.gradientStops.length-1].color:'#ffffff');
const gradColor3=el.gradientColor3||gradColor2;
const angle=(el.gradientAngle||0)*Math.PI/180;
const gradSize=(el.gradientSize||100)/100;
const gradX=el.gradientX||0;
const gradY=el.gradientY||0;
const baseR=Math.max(w,el.fontSize)*1.5;
const r=baseR*gradSize;
let x1=-Math.cos(angle)*r+gradX,y1=-Math.sin(angle)*r+gradY,x2=Math.cos(angle)*r+gradX,y2=Math.sin(angle)*r+gradY;
const grad=ctx.createLinearGradient(x1,y1,x2,y2);

// 【修复】导出函数 - 与预览完全一致
function exportCanvasToBase64(transparent){
// 固定导出 600x800，不使用缩放
const ec=document.createElement('canvas');
ec.width=600;
ec.height=800;
const ectx=ec.getContext('2d');
// 设置与主 canvas 相同的渲染参数
ectx.imageSmoothingEnabled=true;
ectx.imageSmoothingQuality='high';
// 关键：使用 'middle' 与预览一致
ectx.textBaseline='middle';

// 清除背景
ectx.clearRect(0,0,600,800);
if(!transparent){
ectx.fillStyle='#1a1a1a';
ectx.fillRect(0,0,600,800);
}

// 保存原始 glow 值
const originalGlowValues=[];

// 渲染模板图层（包括 imageSlot）
templateElements.forEach((el,idx)=>{
if(el.visible===false)return;
ectx.save();
ectx.globalAlpha=el.opacity;

if(el.type==='text'){
    // 限制 glowBlur 最大值为 8（Safari/手机兼容）
    if(el.glowBlur>8){
        originalGlowValues.push({el:el, originalGlowBlur: el.glowBlur});
        el.glowBlur=8;
    }
    renderText(ectx,el);
}else if(el.type==='image'){
    ectx.translate(el.x,el.y);
    ectx.rotate(el.rotation*Math.PI/180);
    const w=el.width*(el.scale||1);
    const h=el.height*(el.scale||1);
    ectx.drawImage(el.img,-w/2,-h/2,w,h);
}else if(el.type==='imageSlot'){
    // 渲染 imageSlot
    ectx.translate(el.x,el.y);
    ectx.rotate(el.rotation*Math.PI/180);
    const w=el.width*(el.scale||1);
    const h=el.height*(el.scale||1);
    if(el.img){
        ectx.drawImage(el.img,-w/2,-h/2,w,h);
    }else{
        // 渲染白色占位框（与预览完全一致）
        ectx.fillStyle='#ffffff';
        ectx.fillRect(-w/2,-h/2,w,h);
        ectx.strokeStyle='#cccccc';
        ectx.setLineDash([6,4]);
        ectx.strokeRect(-w/2,-h/2,w,h);
        ectx.setLineDash([]);
        ectx.fillStyle='#999';
        ectx.font='12px Arial';
        ectx.textAlign='center';
        ectx.fillText('点击替换',0,0);
    }
}
ectx.restore();
});

// 渲染预设图层
presetElements.forEach((el,idx)=>{
if(el.visible===false)return;
ectx.save();
ectx.globalAlpha=el.opacity;
if(el.type==='text'){
    // 限制 glowBlur 最大值为 8
    if(el.glowBlur>8){
        originalGlowValues.push({el:el, originalGlowBlur: el.glowBlur});
        el.glowBlur=8;
    }
    renderText(ectx,el);
}else if(el.type==='image'){
    ectx.translate(el.x,el.y);
    ectx.rotate(el.rotation*Math.PI/180);
    const w=el.width*(el.scale||1);
    const h=el.height*(el.scale||1);
    ectx.drawImage(el.img,-w/2,-h/2,w,h);
}
ectx.restore();
});

// 恢复原始 glow 值
originalGlowValues.forEach(item=>{
item.el.glowBlur=item.originalGlowBlur;
});

return ec.toDataURL('image/png');
}
